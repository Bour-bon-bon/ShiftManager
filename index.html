<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>シフト管理表</title>
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body { font-family: -apple-system, 'Hiragino Sans', 'Yu Gothic', 'Helvetica Neue', sans-serif; background: #FAF7F0; color: #1C1B19; }
  .num { font-variant-numeric: tabular-nums; }
  button { cursor: pointer; font-family: inherit; }
  select, input { font-family: inherit; }
  .bar:hover { filter: brightness(0.93); }
  .scrollbar-thin::-webkit-scrollbar { height: 8px; }
  .scrollbar-thin::-webkit-scrollbar-thumb { background: #DDD6C5; border-radius: 4px; }

  header.app-header { background: #1C1B19; color: #FAF7F0; padding: 20px 16px 24px; }
  .header-inner { max-width: 1300px; margin: 0 auto; }
  .header-top { display: flex; align-items: baseline; justify-content: space-between; flex-wrap: wrap; gap: 8px; }
  .eyebrow { font-size: 11px; letter-spacing: 2px; color: #E8590C; font-weight: 700; margin-bottom: 4px; }
  h1 { font-size: 24px; font-weight: 900; margin: 0; letter-spacing: 0.5px; }
  .staff-btn { display: flex; align-items: center; gap: 6px; background: #FAF7F0; color: #1C1B19; border: none; border-radius: 8px; padding: 10px 14px; font-weight: 700; font-size: 13px; white-space: nowrap; }
  .logout-btn { display: flex; align-items: center; gap: 5px; background: transparent; color: #9C9382; border: 1px solid #4A4840; border-radius: 8px; padding: 8px 10px; font-weight: 700; font-size: 12px; white-space: nowrap; cursor: pointer; }
  .logout-btn:hover { background: #333; color: #FAF7F0; }
  .header-btns { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
  .btn-label { display: inline; }
  @media (max-width: 600px) {
    .btn-label { display: none; }
    .staff-btn { padding: 10px; }
    .logout-btn { padding: 8px; }
    .toggle-btn { padding: 8px; }
    .header-btns { gap: 4px; }
    header.app-header { padding: 14px 12px 16px; }
    h1 { font-size: 18px !important; }
  }
  .badge-month { font-weight: 700; font-size: 13px; background: #1C3A2A; border: 1px solid #2F6B3A; padding: 6px 12px; border-radius: 8px; color: #7EC89A; }
  .badge-dispatch { font-weight: 700; font-size: 13px; background: #2A1C3A; border: 1px solid #6B3A9B; padding: 6px 12px; border-radius: 8px; color: #C89AE8; }
  .dispatch-tag { font-size: 10px; font-weight: 700; background: #6B3A9B; color: #fff; border-radius: 4px; padding: 1px 5px; margin-left: 4px; }
  .dispatch-row { display: flex; align-items: center; gap: 6px; margin-top: 6px; flex-wrap: wrap; }
  .dispatch-fee-input { width: 52px; border: 1px solid #E5DFCB; border-radius: 6px; padding: 4px 6px; font-size: 13px; text-align: right; }
  .storage-note { margin-top: 10px; font-size: 11px; color: #9C9382; }

  main.app-main { max-width: 1300px; margin: 0 auto; padding: 16px; }
  .week-nav-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; gap: 8px; flex-wrap: wrap; }
  .week-nav-left { display: flex; align-items: center; gap: 8px; }
  .nav-btn { width: 36px; height: 36px; border-radius: 8px; border: 1px solid #E5DFCB; background: #fff; display: flex; align-items: center; justify-content: center; }
  .week-label { display: flex; align-items: center; gap: 8px; font-weight: 700; font-size: 15px; min-width: 150px; justify-content: center; }
  .today-btn { width: auto; padding: 0 12px; font-size: 12px; font-weight: 700; }
  .badge-shortage { display: flex; align-items: center; gap: 6px; color: #D6402C; font-weight: 700; font-size: 13px; background: #FBE7E3; padding: 6px 12px; border-radius: 8px; }
  .badge-clear { display: flex; align-items: center; gap: 6px; color: #2F6B3A; font-weight: 700; font-size: 13px; background: #E5F0E2; padding: 6px 12px; border-radius: 8px; }
  .badge-cost { font-weight: 700; font-size: 13px; background: #F3F0E8; padding: 6px 12px; border-radius: 8px; color: #1C1B19; }

  .grid-wrap { overflow-x: auto; border: 1px solid #E5DFCB; border-radius: 12px; background: #fff; }
  .grid-inner { }
  .hour-header { display: flex; border-bottom: 2px solid #1C1B19; }
  .hour-header-spacer { width: 90px; flex-shrink: 0; background: #1C1B19; }
  .hour-cell { width: 64px; flex-shrink: 0; font-size: 10px; color: #9C9382; text-align: left; padding: 6px 0 6px 3px; border-left: 1px solid #EFE9D8; }
  .hour-cell.first { border-left: none; }

  .day-row { display: flex; border-top: 2px solid #B0A898; }

  /* トグルボタン */
  .toggle-btn { display: flex; align-items: center; gap: 5px; background: transparent; color: #9C9382; border: 1px solid #4A4840; border-radius: 8px; padding: 8px 10px; font-weight: 700; font-size: 12px; cursor: pointer; white-space: nowrap; }
  .toggle-btn.active { background: #2F6B3A; color: #fff; border-color: #2F6B3A; }
  .toggle-btn:hover { background: #333; color: #FAF7F0; }

  /* 印刷用スタイル */
  @media print {
    body { background: #fff; margin: 0; padding: 0; }
    .app-header, .week-nav-row, .helper-text, .day-copy-btn, .day-paste-btn { display: none !important; }
    .app-main { padding: 0 !important; max-width: none !important; }
    .grid-wrap { border: none !important; border-radius: 0 !important; overflow: visible !important; box-shadow: none !important; }
    .grid-inner { min-width: unset !important; }
    .work-bar { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    .slot-bg { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    .drag-handle { display: none !important; }
    .print-scale-wrap { transform-origin: top left; }
    @page { size: A4 landscape; margin: 8mm; }
  }
  .day-label { width: 90px; flex-shrink: 0; background: #FAF7F0; padding: 8px 10px; display: flex; flex-direction: column; justify-content: center; }
  .day-label.today { background: #FFF0E5; }
  .day-date { font-weight: 900; font-size: 15px; }
  .day-weekday { font-size: 11px; font-weight: 700; color: #9C9382; }
  .day-shortage { display: flex; align-items: center; gap: 2px; color: #D6402C; font-size: 10px; font-weight: 700; margin-top: 2px; }
  .day-cost { font-size: 10px; color: #5A7A3A; font-weight: 700; margin-top: 2px; }

  .timeline { position: relative; background: #FAFAF7; cursor: pointer; }
  .hour-line { position: absolute; top: 0; bottom: 0; width: 1px; background: #EFE9D8; pointer-events: none; }
  .hour-line.major { background: #D8D0BC; }
  .slot-bg { position: absolute; top: 0; bottom: 0; pointer-events: none; }
  .slot-label { position: absolute; top: 3px; left: 4px; font-size: 9px; font-weight: 700; white-space: nowrap; }
  .work-bar { position: absolute; border: none; border-radius: 5px; color: #fff; font-size: 11px; font-weight: 700; display: flex; align-items: center; justify-content: center; overflow: visible; white-space: nowrap; padding: 0 12px; cursor: grab; user-select: none; }
  .work-bar.dragging { opacity: 0.85; cursor: grabbing; box-shadow: 0 4px 16px rgba(0,0,0,0.25); z-index: 10; }
  .bar-label { pointer-events: none; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; flex: 1; text-align: center; }
  .drag-handle { position: absolute; top: 0; bottom: 0; width: 10px; background: rgba(255,255,255,0.35); cursor: ew-resize; display: flex; align-items: center; justify-content: center; }
  .drag-handle:hover { background: rgba(255,255,255,0.55); }
  .drag-handle.left { left: 0; border-radius: 5px 0 0 5px; }
  .drag-handle.right { right: 0; border-radius: 0 5px 5px 0; }
  .drag-handle::after { content: ""; display: block; width: 2px; height: 12px; background: rgba(255,255,255,0.7); border-radius: 1px; }

  .day-copy-btn { margin-top: 4px; font-size: 10px; font-weight: 700; padding: 2px 6px; border-radius: 4px; border: 1px solid #D8D0BC; background: #fff; color: #9C9382; cursor: pointer; width: 100%; }
  .day-copy-btn:hover { background: #F3F0E8; color: #1C1B19; }
  .day-copy-btn.copied { background: #E8590C; color: #fff; border-color: #E8590C; }
  .day-paste-btn { margin-top: 4px; font-size: 10px; font-weight: 700; padding: 2px 6px; border-radius: 4px; border: 1px solid #1D5B9B; background: #EAF1FB; color: #1D5B9B; cursor: pointer; width: 100%; }
  .day-paste-btn:hover { background: #1D5B9B; color: #fff; }

  .helper-text { font-size: 12px; color: #9C9382; margin-top: 12px; line-height: 1.6; }

  .overlay { position: fixed; inset: 0; background: rgba(28,27,25,0.5); display: flex; align-items: flex-end; justify-content: center; z-index: 50; }
  .sheet { background: #FAF7F0; border-radius: 16px 16px 0 0; padding: 20px 18px 24px; width: 100%; max-width: 480px; max-height: 85vh; overflow-y: auto; }
  .sheet-header { display: flex; justify-content: space-between; align-items: flex-start; }
  .sheet-title { margin: 2px 0 0; font-size: 18px; font-weight: 900; }
  .sheet-sub { font-size: 11px; color: #9C9382; font-weight: 700; }
  .icon-btn { background: none; border: none; color: #1C1B19; display: flex; }
  .field-label { font-size: 12px; font-weight: 700; color: #9C9382; margin-bottom: 6px; }
  .field { margin-top: 14px; }
  .field-row { display: flex; gap: 10px; margin-top: 14px; }
  .select-input, input[type=number], input[type=text] { width: 100%; border: 1px solid #E5DFCB; border-radius: 8px; padding: 10px 12px; font-size: 14px; background: #fff; }
  .cost-preview { margin-top: 12px; background: #F3F0E8; border-radius: 8px; padding: 10px 12px; font-size: 13px; }
  .cost-preview-label { color: #9C9382; margin-bottom: 4px; }
  .cost-preview-value { font-weight: 700; font-size: 16px; color: #1C1B19; }
  .cost-preview-detail { font-size: 11px; color: #9C9382; margin-top: 2px; }
  .invalid-warn { display: flex; align-items: center; gap: 6px; color: #D6402C; font-size: 12px; font-weight: 700; background: #FBEAE7; padding: 8px 10px; border-radius: 8px; margin-top: 12px; }
  .btn-row { display: flex; gap: 8px; margin-top: 20px; }
  .btn-delete { display: flex; align-items: center; gap: 6px; background: #fff; color: #D6402C; border: 1px solid #F0C9C4; border-radius: 10px; padding: 12px 16px; font-weight: 700; font-size: 14px; }
  .btn-primary { flex: 1; background: #1C1B19; color: #fff; border: none; border-radius: 10px; padding: 12px; font-weight: 700; font-size: 14px; }
  .btn-primary:disabled { background: #D8D0BC; cursor: not-allowed; }

  .staff-add-row { display: flex; gap: 8px; }
  .staff-add-btn { display: flex; align-items: center; justify-content: center; gap: 4px; background: #E8590C; color: #fff; border: none; border-radius: 8px; padding: 11px; font-weight: 700; font-size: 13px; width: 100%; margin-top: 8px; }
  .staff-list-item { display: flex; align-items: center; gap: 8px; border: 1px solid #EFE9D8; border-radius: 8px; padding: 8px 12px; }
  .staff-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .staff-name { font-weight: 700; font-size: 14px; flex: 1; }
  .wage-input-wrap { display: flex; align-items: center; gap: 4px; }
  .wage-input { width: 72px; border: 1px solid #E5DFCB; border-radius: 6px; padding: 4px 6px; font-size: 13px; text-align: right; }
  .wage-symbol { font-size: 11px; color: #9C9382; }

  .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); color: #fff; padding: 10px 18px; border-radius: 8px; font-size: 13px; font-weight: 700; z-index: 100; box-shadow: 0 4px 16px rgba(0,0,0,0.2); }
  .toast.error { background: #D6402C; }
  .toast.info { background: #1C1B19; }

  #error-box { display: none; position: fixed; inset: 0; background: #FAF7F0; padding: 24px; font-family: monospace; white-space: pre-wrap; color: #D6402C; z-index: 9999; overflow: auto; }

  /* パスワード画面 */
  #pw-screen { position: fixed; inset: 0; background: #1C1B19; display: flex; align-items: center; justify-content: center; z-index: 200; }
  .pw-box { background: #FAF7F0; border-radius: 16px; padding: 32px 28px; width: 100%; max-width: 360px; text-align: center; }
  .pw-logo { font-size: 11px; letter-spacing: 2px; color: #E8590C; font-weight: 700; margin-bottom: 8px; }
  .pw-title { font-size: 22px; font-weight: 900; margin: 0 0 6px; }
  .pw-sub { font-size: 13px; color: #9C9382; margin-bottom: 24px; }
  .pw-input { width: 100%; border: 2px solid #E5DFCB; border-radius: 10px; padding: 12px 14px; font-size: 16px; background: #fff; text-align: center; letter-spacing: 4px; outline: none; }
  .pw-input:focus { border-color: #E8590C; }
  .pw-btn { margin-top: 14px; width: 100%; background: #1C1B19; color: #fff; border: none; border-radius: 10px; padding: 14px; font-weight: 700; font-size: 15px; cursor: pointer; }
  .pw-btn:hover { background: #333; }
  .pw-error { margin-top: 12px; color: #D6402C; font-size: 13px; font-weight: 700; min-height: 20px; }
  .pw-change-link { margin-top: 20px; font-size: 12px; color: #B3AA94; cursor: pointer; text-decoration: underline; }
</style>
</head>
<body>
<div id="pw-screen">
  <div class="pw-box">
    <div class="pw-logo">SHIFT BOARD</div>
    <h2 class="pw-title">シフト管理表</h2>
    <p class="pw-sub">パスワードを入力してください</p>
    <input id="pw-input" class="pw-input" type="password" placeholder="••••••••" autocomplete="current-password" />
    <button class="pw-btn" id="pw-btn">ログイン</button>
    <div class="pw-error" id="pw-error"></div>
    <div class="pw-change-link" id="pw-change-link">パスワードを変更する</div>
  </div>
</div>
<div id="app-root" style="display:none;"></div>
<div id="error-box"></div>

<script>
window.addEventListener("error", function (e) {
  var box = document.getElementById("error-box");
  if (box) {
    box.style.display = "block";
    box.textContent = "エラーが発生しました:\n\n" + (e.message || (e.error && e.error.message) || "") + "\n\nファイル: " + (e.filename || "") + "  行: " + (e.lineno || "");
  }
});
</script>

<script>
// ===================== パスワード認証 =====================
// ▼▼▼ パスワードをここで設定します ▼▼▼
// このファイルを開いたとき、下記のパスワードを入力しないと操作できません。
// 変更したい場合は「shift1234」の部分を好きな文字列に変えて保存してください。
var PLAIN_PASSWORD = "shift1234";
// ▲▲▲ ここまで ▲▲▲

var PW_HASH_KEY = "shift:pw_hash";
var SESSION_KEY = "shift:session";

// SHA-256ハッシュ(Web Crypto API使用、外部依存なし)
function hashPassword(plain) {
  var encoder = new TextEncoder();
  var data = encoder.encode(plain);
  return crypto.subtle.digest("SHA-256", data).then(function (buf) {
    return Array.from(new Uint8Array(buf)).map(function (b) { return b.toString(16).padStart(2, "0"); }).join("");
  });
}

// 起動時: パスワードのハッシュをlocalStorageに保存(初回のみ)
hashPassword(PLAIN_PASSWORD).then(function (hash) {
  localStorage.setItem(PW_HASH_KEY, hash);
  initPasswordScreen(hash);
});

function initPasswordScreen(correctHash) {
  // すでに認証済みセッションがあればスキップ
  if (sessionStorage.getItem(SESSION_KEY) === correctHash) {
    unlockApp();
    return;
  }

  var input = document.getElementById("pw-input");
  var btn = document.getElementById("pw-btn");
  var errorEl = document.getElementById("pw-error");
  var changeLink = document.getElementById("pw-change-link");

  function tryLogin() {
    hashPassword(input.value).then(function (h) {
      if (h === correctHash) {
        sessionStorage.setItem(SESSION_KEY, correctHash);
        errorEl.textContent = "";
        unlockApp();
      } else {
        errorEl.textContent = "パスワードが違います";
        input.value = "";
        input.focus();
      }
    });
  }

  btn.addEventListener("click", tryLogin);
  input.addEventListener("keydown", function (e) { if (e.key === "Enter") tryLogin(); });
  input.focus();

  // パスワード変更リンク
  changeLink.addEventListener("click", function () {
    var newPw = prompt("新しいパスワードを入力してください:");
    if (!newPw || !newPw.trim()) return;
    var confirmPw = prompt("もう一度入力してください:");
    if (newPw !== confirmPw) { alert("パスワードが一致しません。"); return; }
    hashPassword(newPw).then(function (newHash) {
      localStorage.setItem(PW_HASH_KEY, newHash);
      correctHash = newHash;
      sessionStorage.setItem(SESSION_KEY, newHash);
      alert("パスワードを変更しました。次回から新しいパスワードで開けます。\n\nHTMLファイル内の PLAIN_PASSWORD の値も変更することをお勧めします。");
    });
  });
}

function unlockApp() {
  document.getElementById("pw-screen").style.display = "none";
  document.getElementById("app-root").style.display = "";
  // シフト管理アプリ本体を起動
  startApp();
}
</script>

<script>
function startApp() {
(function () {
  "use strict";

  // ===================== ユーティリティ =====================
  function el(tag, attrs, children) {
    var node = document.createElement(tag);
    attrs = attrs || {};
    Object.keys(attrs).forEach(function (key) {
      var val = attrs[key];
      if (val === null || val === undefined || val === false) return;
      if (key === "class") { node.className = val; }
      else if (key === "text") { node.textContent = val; }
      else if (key.indexOf("on") === 0 && typeof val === "function") {
        node.addEventListener(key.slice(2).toLowerCase(), val);
      } else if (key === "style" && typeof val === "object") {
        Object.assign(node.style, val);
      } else if (key === "html") {
        node.innerHTML = val;
      } else if (val === true) {
        node.setAttribute(key, "");
      } else {
        node.setAttribute(key, val);
      }
    });
    (children || []).forEach(function (c) {
      if (c === null || c === undefined || c === false) return;
      if (typeof c === "string" || typeof c === "number") {
        node.appendChild(document.createTextNode(String(c)));
      } else {
        node.appendChild(c);
      }
    });
    return node;
  }

  function svgIcon(pathsHtml, size, color) {
    var svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
    svg.setAttribute("width", size || 16);
    svg.setAttribute("height", size || 16);
    svg.setAttribute("viewBox", "0 0 24 24");
    svg.setAttribute("fill", "none");
    svg.setAttribute("stroke", color || "currentColor");
    svg.setAttribute("stroke-width", "2");
    svg.setAttribute("stroke-linecap", "round");
    svg.setAttribute("stroke-linejoin", "round");
    svg.innerHTML = pathsHtml;
    return svg;
  }
  function iconX(size, color) { return svgIcon('<line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>', size, color); }
  function iconUsers(size, color) { return svgIcon('<path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>', size, color); }
  function iconChevronLeft(size, color) { return svgIcon('<polyline points="15 18 9 12 15 6"/>', size, color); }
  function iconChevronRight(size, color) { return svgIcon('<polyline points="9 18 15 12 9 6"/>', size, color); }
  function iconCheck(size, color) { return svgIcon('<polyline points="20 6 9 17 4 12"/>', size, color); }
  function iconAlert(size, color) { return svgIcon('<path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/>', size, color); }
  function iconTrash(size, color) { return svgIcon('<polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/>', size, color); }
  function iconUserPlus(size, color) { return svgIcon('<path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="8.5" cy="7" r="4"/><line x1="20" y1="8" x2="20" y2="14"/><line x1="23" y1="11" x2="17" y2="11"/>', size, color); }
  function iconCalendar(size, color) { return svgIcon('<rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>', size, color); }
  // ヘッダーボタン専用アイコン
  // 金額表示: 円マーク（¥）
  function iconYen(size, color) { return svgIcon('<line x1="12" y1="12" x2="12" y2="21"/><line x1="8" y1="17" x2="16" y2="17"/><line x1="8" y1="14" x2="16" y2="14"/><path d="M17 4L12 11L7 4"/>', size, color); }
  // PDF出力: ファイルに下向き矢印
  function iconFilePrint(size, color) { return svgIcon('<path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="12" y1="11" x2="12" y2="17"/><polyline points="9 15 12 18 15 15"/>', size, color); }
  // エクスポート: ファイルに上向き矢印（送り出す）
  function iconExport(size, color) { return svgIcon('<path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>', size, color); }
  // インポート: ファイルに下向き矢印（受け取る）
  function iconImport(size, color) { return svgIcon('<path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>', size, color); }
  // ログアウト: ドアから出る矢印
  function iconLogout(size, color) { return svgIcon('<path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>', size, color); }
  // スタッフ管理: 人+歯車
  function iconStaffSettings(size, color) { return svgIcon('<path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/><circle cx="19" cy="19" r="2"/><path d="M19 15v2m0 4v-2m-2-2h2m4 0h-2"/>', size, color); }

  // ===================== 固定設定 =====================
  var DAY_START_HOUR = 8;
  var SLOTS = [
    { id: "s1", label: "8:00–13:00", min: 2, max: 2, startMin: 0, endMin: 300, tint: "#E8590C" },
    { id: "s2", label: "9:00–13:00", min: 1, max: 1, startMin: 60, endMin: 300, tint: "#C76B00" },
    { id: "s3", label: "13:00–17:00", min: 2, max: 3, startMin: 300, endMin: 540, tint: "#1C7C54" },
    { id: "s4", label: "17:00–22:00", min: 3, max: 3, startMin: 540, endMin: 840, tint: "#1D5B9B" },
    { id: "s5", label: "22:00–翌8:00", min: 2, max: 2, startMin: 840, endMin: 1440, tint: "#3D3A6B" }
  ];
  var HOUR_MARKS = Array.from({ length: 24 }, function (_, i) { return (DAY_START_HOUR + i) % 24; });
  var STAFF_COLORS = ["#E8590C", "#1D5B9B", "#1C7C54", "#A6334F", "#3D3A6B", "#B5862B", "#2F8F8F", "#8C4A2F", "#6B5B95", "#C2484A"];
  var ROW_H = 36, HEADER_W = 90, HOUR_W = 64, TIMELINE_W = HOUR_W * 24;

  function pad(n) { return String(n).padStart(2, "0"); }
  function dateKey(d) { return d.getFullYear() + "-" + pad(d.getMonth() + 1) + "-" + pad(d.getDate()); }
  function addDays(d, n) { var r = new Date(d); r.setDate(r.getDate() + n); return r; }
  function startOfWeek(d) { var r = new Date(d); var day = r.getDay(); var diff = (day === 0 ? -6 : 1) - day; return addDays(r, diff); }
  var WEEKDAY_JA = ["日", "月", "火", "水", "木", "金", "土"];
  function uid() { return Math.random().toString(36).slice(2, 10); }

  function minutesToClock(min) {
    var totalMin = ((min % 1440) + 1440) % 1440;
    var realHour = (DAY_START_HOUR + Math.floor(totalMin / 60)) % 24;
    var realMin = totalMin % 60;
    return realHour + ":" + pad(realMin);
  }
  function formatClock(min, isEnd) {
    if (isEnd && min === 1440) return "8:00";
    return minutesToClock(min);
  }

  var TIME_OPTIONS = (function () {
    var opts = [];
    for (var i = 0; i <= 48; i++) {
      var min = i * 30;
      var val = min === 1440 ? 1440 : min;
      opts.push({ value: val, label: minutesToClock(min === 1440 ? 0 : min) + (min === 1440 ? "(翌)" : "") });
    }
    return opts;
  })();

  // ===================== Storage (localStorage) =====================
  function storageAvailable() {
    try { return typeof window !== "undefined" && !!window.localStorage; } catch (e) { return false; }
  }
  function storageGet(key) {
    if (!storageAvailable()) return null;
    try {
      var raw = window.localStorage.getItem(key);
      if (raw === null) return null;
      try { return JSON.parse(raw); } catch (e) { return null; }
    } catch (e) { return null; }
  }
  function storageSet(key, value) {
    if (!storageAvailable()) return { ok: false, error: "この環境ではデータ保存機能が使えません" };
    var serialized;
    try { serialized = JSON.stringify(value); } catch (e) { return { ok: false, error: "データ形式が不正: " + e.message }; }
    try {
      window.localStorage.setItem(key, serialized);
      return { ok: true };
    } catch (e) {
      return { ok: false, error: (e && (e.message || e.toString())) || "不明なエラー(保存容量の上限の可能性があります)" };
    }
  }

  var STAFF_KEY = "shift:staff";
  var ENTRY_PREFIX = "shift:entries:";

  // ===================== アプリ状態 =====================
  var state = {
    staff: storageGet(STAFF_KEY) || [],
    weekStart: startOfWeek(new Date()),
    entriesByDate: {},
    staffPanelOpen: false,
    editingEntry: null,
    copiedDKey: null,
    showCost: true,
    toast: null
  };
  var toastTimer = null;

  function getDays() {
    return Array.from({ length: 7 }, function (_, i) { return addDays(state.weekStart, i); });
  }
  function loadWeekEntries() {
    getDays().forEach(function (d) {
      var key = dateKey(d);
      if (!(key in state.entriesByDate)) {
        state.entriesByDate[key] = storageGet(ENTRY_PREFIX + key) || [];
      }
    });
  }

  function showToast(msg, kind) {
    state.toast = { msg: msg, kind: kind || "info" };
    render();
    if (toastTimer) clearTimeout(toastTimer);
    toastTimer = setTimeout(function () { state.toast = null; render(); }, kind === "error" ? 4000 : 2000);
  }

  function persistStaff() {
    var result = storageSet(STAFF_KEY, state.staff);
    if (!result.ok) showToast("保存に失敗しました: " + result.error, "error");
  }
  function persistEntries(dKey) {
    var result = storageSet(ENTRY_PREFIX + dKey, state.entriesByDate[dKey]);
    if (!result.ok) showToast("保存に失敗しました: " + result.error, "error");
  }

  function staffById() {
    var m = {};
    state.staff.forEach(function (s) { m[s.id] = s; });
    return m;
  }

  function calcEntryCost(entry) {
    var s = staffById()[entry.staffId];
    if (!s) return { wage: 0, fee: 0, total: 0 };
    var workMin = Math.max((entry.end - entry.start) - (entry.breakMin || 0), 0);
    var hours = workMin / 60;
    var wage = Math.round(hours * (s.hourlyWage || 0)) + (entry.bonus || 0);
    var fee = s.isDispatch ? Math.round(wage * (s.dispatchFeeRate || 0) / 100) : 0;
    return { wage: wage, fee: fee, total: wage + fee };
  }
  function calcDayCost(dKey) {
    return (state.entriesByDate[dKey] || []).reduce(function (sum, e) { return sum + calcEntryCost(e).total; }, 0);
  }
  function calcDayDispatchFee(dKey) {
    return (state.entriesByDate[dKey] || []).reduce(function (sum, e) { return sum + calcEntryCost(e).fee; }, 0);
  }
  function countShortageForDay(dKey) {
    var list = state.entriesByDate[dKey] || [];
    var shortage = 0;
    SLOTS.forEach(function (slot) {
      var overlapping = list.filter(function (e) { return e.start < slot.endMin && e.end > slot.startMin; });
      if (overlapping.length < slot.min) shortage += slot.min - overlapping.length;
    });
    return shortage;
  }
  function computeRows(dKey) {
    var list = (state.entriesByDate[dKey] || []).slice().sort(function (a, b) { return a.start - b.start || a.end - b.end; });
    var rows = [];
    var placements = [];
    list.forEach(function (entry) {
      var placedRow = rows.findIndex(function (rowEnd) { return rowEnd <= entry.start; });
      if (placedRow === -1) { placedRow = rows.length; rows.push(entry.end); }
      else { rows[placedRow] = entry.end; }
      placements.push({ entry: entry, row: placedRow });
    });
    return { rowCount: Math.max(rows.length, 1), placements: placements };
  }

  // ===================== アクション =====================
  function copyDay(dKey) {
    state.copiedDKey = dKey;
    showToast((state.entriesByDate[dKey] || []).length + "件のシフトをコピーしました", "info");
    render();
  }

  function pasteDay(toDKey) {
    var src = state.entriesByDate[state.copiedDKey] || [];
    if (src.length === 0) { showToast("コピー元にシフトがありません", "error"); return; }
    var existing = state.entriesByDate[toDKey] || [];
    var added = src.map(function (e) { return Object.assign({}, e, { id: uid() }); });
    state.entriesByDate[toDKey] = existing.concat(added);
    persistEntries(toDKey);
    state.copiedDKey = null;
    showToast(added.length + "件のシフトを貼り付けました", "info");
    render();
  }

  function addStaff(name, wage) {
    name = (name || "").trim();
    if (!name) return;
    var color = STAFF_COLORS[state.staff.length % STAFF_COLORS.length];
    var hourlyWage = wage !== "" && wage !== undefined ? Number(wage) : 0;
    state.staff.push({ id: uid(), name: name, color: color, hourlyWage: hourlyWage, isDispatch: false, dispatchFeeRate: 0 });
    persistStaff();
    render();
  }
  function updateStaffWage(id, wage) {
    state.staff = state.staff.map(function (s) { return s.id === id ? Object.assign({}, s, { hourlyWage: Number(wage) || 0 }) : s; });
    persistStaff();
  }
  function updateStaffDispatch(id, isDispatch, feeRate) {
    state.staff = state.staff.map(function (s) {
      if (s.id !== id) return s;
      return Object.assign({}, s, { isDispatch: isDispatch, dispatchFeeRate: Number(feeRate) || 0 });
    });
    persistStaff();
  }
  function removeStaff(id) {
    state.staff = state.staff.filter(function (s) { return s.id !== id; });
    persistStaff();
    Object.keys(state.entriesByDate).forEach(function (dKey) {
      var list = state.entriesByDate[dKey] || [];
      if (list.some(function (e) { return e.staffId === id; })) {
        state.entriesByDate[dKey] = list.filter(function (e) { return e.staffId !== id; });
        persistEntries(dKey);
      }
    });
    render();
  }
  function saveEntry(dKey, entry) {
    var list = state.entriesByDate[dKey] || [];
    var exists = list.some(function (e) { return e.id === entry.id; });
    state.entriesByDate[dKey] = exists ? list.map(function (e) { return e.id === entry.id ? entry : e; }) : list.concat([entry]);
    persistEntries(dKey);
    state.editingEntry = null;
    render();
  }
  function deleteEntry(dKey, entryId) {
    var list = state.entriesByDate[dKey] || [];
    state.entriesByDate[dKey] = list.filter(function (e) { return e.id !== entryId; });
    persistEntries(dKey);
    state.editingEntry = null;
    render();
  }

  // ===================== エクスポート・インポート =====================
  function exportData() {
    var allEntries = {};
    try {
      for (var i = 0; i < localStorage.length; i++) {
        var key = localStorage.key(i);
        if (key && key.indexOf(ENTRY_PREFIX) === 0) {
          try { allEntries[key] = JSON.parse(localStorage.getItem(key)); } catch (e) {}
        }
      }
    } catch (e) {}
    var data = {
      version: 1,
      exportedAt: new Date().toISOString(),
      staff: state.staff,
      entries: allEntries
    };
    var json = JSON.stringify(data, null, 2);
    var dateStr = new Date().toISOString().slice(0, 10);
    var filename = "shift_backup_" + dateStr + ".json";

    try {
      var blob = new Blob([json], { type: "application/json" });
      var url = URL.createObjectURL(blob);
      var a = document.createElement("a");
      a.href = url;
      a.download = filename;
      if (navigator.userAgent.indexOf("Safari") === -1 || navigator.userAgent.indexOf("Chrome") !== -1) {
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
        showToast("エクスポートしました", "info");
      } else {
        URL.revokeObjectURL(url);
        throw new Error("safari_fallback");
      }
    } catch (e) {
      var dataUrl = "data:application/json;charset=utf-8," + encodeURIComponent(json);
      var win = window.open(dataUrl, "_blank");
      if (!win) {
        showExportModal(json, filename);
      } else {
        showToast("新しいタブでJSONが開きました。長押し→「ファイルに保存」で保存してください", "info");
      }
    }
  }

  function printShift() {
    var days = getDays();
    var sById = staffById();
    var weekLabel = (state.weekStart.getMonth() + 1) + "/" + state.weekStart.getDate() +
                    " – " + (addDays(state.weekStart, 6).getMonth() + 1) + "/" + addDays(state.weekStart, 6).getDate();

    // 印刷用の定数(A4横向き: 印刷幅約277mm / 24時間)
    var PRINT_HOUR_W = 34;   // 1時間あたりのpx幅(印刷用)
    var PRINT_ROW_H = 28;    // 1行の高さ(印刷用)
    var PRINT_HEADER_W = 52; // 日付列幅
    var PRINT_TIMELINE_W = PRINT_HOUR_W * 24;

    // 印刷用HTML: グリッドをゼロから構築
    var html = '<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8">';
    html += '<style>';
    html += '* { box-sizing: border-box; margin: 0; padding: 0; }';
    html += 'body { font-family: -apple-system, "Hiragino Sans", "Yu Gothic", sans-serif; background: #fff; padding: 6mm; }';
    html += 'h2 { font-size: 11pt; font-weight: 900; margin-bottom: 4px; }';
    html += '.grid { border: 1px solid #888; border-radius: 0; width: 100%; border-collapse: collapse; table-layout: fixed; }';
    html += '.hour-header { display: flex; border-bottom: 2px solid #000; }';
    html += '.hh-spacer { width: ' + PRINT_HEADER_W + 'px; flex-shrink: 0; background: #1C1B19; }';
    html += '.hh-cell { width: ' + PRINT_HOUR_W + 'px; flex-shrink: 0; font-size: 7px; color: #555; padding: 3px 0 3px 2px; border-left: 1px solid #ccc; }';
    html += '.day-row { display: flex; border-top: 2px solid #888; }';
    html += '.day-label { width: ' + PRINT_HEADER_W + 'px; flex-shrink: 0; padding: 4px 4px; background: #f5f3ee; display: flex; flex-direction: column; justify-content: center; border-right: 1px solid #888; }';
    html += '.day-date { font-size: 9pt; font-weight: 900; }';
    html += '.day-wd { font-size: 7pt; color: #666; }';
    html += '.day-sun .day-wd { color: #c00; }';
    html += '.day-sat .day-wd { color: #00c; }';
    html += '.day-today { background: #fff3ea; }';
    html += '.timeline { position: relative; width: ' + PRINT_TIMELINE_W + 'px; flex-shrink: 0; background: #fafaf7; }';
    html += '.h-line { position: absolute; top: 0; bottom: 0; width: 1px; background: #ddd; }';
    html += '.h-line.major { background: #aaa; }';
    html += '.bar { position: absolute; border-radius: 3px; color: #fff; font-size: 7px; font-weight: 700; display: flex; align-items: center; justify-content: center; overflow: hidden; white-space: nowrap; padding: 0 2px; -webkit-print-color-adjust: exact; print-color-adjust: exact; }';
    html += '.slot-bg { position: absolute; top: 0; bottom: 0; border-left: 2px solid rgba(0,0,0,0.12); }';
    html += '@page { size: A4 landscape; margin: 6mm; }';
    html += '@media print { body { padding: 0; } }';
    html += '</style></head><body>';
    html += '<h2>シフト管理表 ' + weekLabel + '</h2>';
    html += '<div class="grid">';

    // 時間ヘッダー
    html += '<div class="hour-header"><div class="hh-spacer"></div>';
    for (var hi = 0; hi < 24; hi++) {
      var hLabel = ((8 + hi) % 24) + ':00';
      html += '<div class="hh-cell">' + hLabel + '</div>';
    }
    html += '</div>';

    // 各日行
    var todayKey = dateKey(new Date());
    days.forEach(function(d) {
      var dKey = dateKey(d);
      var rc = computeRows(dKey);
      var placements = rc.placements;
      var rowCount = Math.max(rc.rowCount, 1);
      var rowH = Math.max(PRINT_ROW_H, rowCount * PRINT_ROW_H);
      var isSun = d.getDay() === 0;
      var isSat = d.getDay() === 6;
      var isToday = dKey === todayKey;
      var dayClass = 'day-row' + (isSun ? ' day-sun' : isSat ? ' day-sat' : '') + (isToday ? ' day-today' : '');

      html += '<div class="' + dayClass + '">';
      html += '<div class="day-label' + (isToday ? ' day-today' : '') + '">';
      html += '<div class="day-date">' + (d.getMonth()+1) + '/' + d.getDate() + '</div>';
      html += '<div class="day-wd">(' + WEEKDAY_JA[d.getDay()] + ')</div>';
      html += '</div>';

      html += '<div class="timeline" style="height:' + rowH + 'px;">';

      // 縦線
      for (var li = 0; li < 24; li++) {
        html += '<div class="h-line' + (li % 6 === 0 ? ' major' : '') + '" style="left:' + (li * PRINT_HOUR_W) + 'px;"></div>';
      }

      // SLOT背景(state.showCostに関係なく必要人数ラベルは省略、背景のみ)
      SLOTS.forEach(function(slot) {
        var slotL = (slot.startMin / 60) * PRINT_HOUR_W;
        var slotW = ((slot.endMin - slot.startMin) / 60) * PRINT_HOUR_W;
        var overlapping = placements.filter(function(p) { return p.entry.start < slot.endMin && p.entry.end > slot.startMin; }).length;
        var bg = overlapping < slot.min ? 'rgba(214,64,44,0.08)' : 'transparent';
        html += '<div class="slot-bg" style="left:' + slotL + 'px;width:' + slotW + 'px;background:' + bg + ';border-left-color:' + slot.tint + '55;"></div>';
      });

      // 勤務バー
      placements.forEach(function(pl) {
        var entry = pl.entry, row = pl.row;
        var s = sById[entry.staffId];
        if (!s) return;
        var barL = (entry.start / 60) * PRINT_HOUR_W;
        var barW = Math.max(((entry.end - entry.start) / 60) * PRINT_HOUR_W, 20);
        var barTop = row * PRINT_ROW_H + 3;
        var barH = PRINT_ROW_H - 6;
        var label = s.name;
        if (entry.breakMin) label += '(休' + entry.breakMin + '分)';
        html += '<div class="bar" style="left:' + barL + 'px;top:' + barTop + 'px;width:' + (barW-2) + 'px;height:' + barH + 'px;background:' + s.color + ';">' + label + '</div>';
      });

      html += '</div></div>';
    });

    html += '</div>';
    html += '<script>window.onload = function(){ window.print(); };<\/script>';
    html += '</body></html>';

    var win = window.open('', '_blank');
    if (!win) {
      showToast('ポップアップがブロックされました。ブラウザの設定でポップアップを許可してください', 'error');
      return;
    }
    win.document.write(html);
    win.document.close();
  }

  function showExportModal(json, filename) {
    var overlay = el("div", { style: { position: "fixed", inset: "0", background: "rgba(28,27,25,0.6)", zIndex: "200", display: "flex", alignItems: "center", justifyContent: "center", padding: "16px" } });
    var box = el("div", { style: { background: "#FAF7F0", borderRadius: "12px", padding: "20px", width: "100%", maxWidth: "480px", maxHeight: "80vh", display: "flex", flexDirection: "column", gap: "12px" } });
    var title = el("div", { style: { fontWeight: "700", fontSize: "16px" }, text: "エクスポートデータ" });
    var note = el("div", { style: { fontSize: "12px", color: "#9C9382" }, text: "下のテキストを全て選択してコピーし、メモ帳等に貼り付けて「" + filename + "」という名前で保存してください。" });
    var textarea = el("textarea", { style: { width: "100%", height: "200px", fontSize: "10px", fontFamily: "monospace", border: "1px solid #E5DFCB", borderRadius: "8px", padding: "8px", resize: "none" } });
    textarea.value = json;
    var copyBtn = el("button", { style: { background: "#E8590C", color: "#fff", border: "none", borderRadius: "8px", padding: "12px", fontWeight: "700", fontSize: "14px", cursor: "pointer" },
      onclick: function() { textarea.select(); textarea.setSelectionRange(0, 99999); document.execCommand("copy"); showToast("コピーしました", "info"); }
    });
    copyBtn.textContent = "全てコピー";
    var closeBtn = el("button", { style: { background: "#1C1B19", color: "#fff", border: "none", borderRadius: "8px", padding: "12px", fontWeight: "700", fontSize: "14px", cursor: "pointer" },
      onclick: function() { document.body.removeChild(overlay); }
    });
    closeBtn.textContent = "閉じる";
    box.appendChild(title); box.appendChild(note); box.appendChild(textarea);
    box.appendChild(copyBtn); box.appendChild(closeBtn);
    overlay.appendChild(box);
    overlay.addEventListener("click", function(e) { if (e.target === overlay) document.body.removeChild(overlay); });
    document.body.appendChild(overlay);
    setTimeout(function() { textarea.select(); textarea.setSelectionRange(0, 99999); }, 100);
  }

  function importData(file) {
    if (!file) return;
    var reader = new FileReader();
    reader.onload = function (e) {
      try {
        var data = JSON.parse(e.target.result);
        if (!data.version || !data.staff || !data.entries) {
          showToast("ファイル形式が正しくありません", "error"); return;
        }
        if (!confirm("インポートすると、このデバイスの既存データに追加されます(上書きではありません)。続けますか？")) return;
        var existingIds = state.staff.map(function (s) { return s.id; });
        var newStaff = data.staff.filter(function (s) { return existingIds.indexOf(s.id) === -1; });
        state.staff = state.staff.concat(newStaff);
        storageSet(STAFF_KEY, state.staff);
        Object.keys(data.entries).forEach(function (key) {
          var incoming = data.entries[key] || [];
          var existing = [];
          try { var raw = localStorage.getItem(key); existing = raw ? JSON.parse(raw) : []; } catch (ex) {}
          var existingEntryIds = existing.map(function (e) { return e.id; });
          var newEntries = incoming.filter(function (e) { return existingEntryIds.indexOf(e.id) === -1; });
          var merged = existing.concat(newEntries);
          localStorage.setItem(key, JSON.stringify(merged));
          var dKey = key.replace(ENTRY_PREFIX, "");
          if (dKey in state.entriesByDate) state.entriesByDate[dKey] = merged;
        });
        loadWeekEntries();
        render();
        showToast("インポートしました (スタッフ +" + newStaff.length + "名)", "info");
      } catch (err) {
        showToast("読み込みに失敗しました: " + (err.message || ""), "error");

  // 月次人件費: 現在表示中の週が属する月の1日〜末日の合計を計算
  function calcMonthCost() {
    var refDate = state.weekStart;
    var year = refDate.getFullYear();
    var month = refDate.getMonth();
    var firstDay = new Date(year, month, 1);
    var lastDay = new Date(year, month + 1, 0);
    var total = 0, dispatchFee = 0;
    for (var d = new Date(firstDay); d <= lastDay; d.setDate(d.getDate() + 1)) {
      var key = dateKey(new Date(d));
      var entries = state.entriesByDate[key];
      if (!entries) {
        try {
          var raw = window.localStorage.getItem(ENTRY_PREFIX + key);
          entries = raw ? JSON.parse(raw) : [];
        } catch (e) { entries = []; }
      }
      entries.forEach(function (e) {
        var c = calcEntryCost(e);
        total += c.total;
        dispatchFee += c.fee;
      });
    }
    return { total: total, dispatchFee: dispatchFee, year: year, month: month + 1 };
  }

  // ===================== 描画: グリッド本体 =====================
  function renderGrid() {
    var days = getDays();
    var sById = staffById();

    var hourHeaderCells = [el("div", { class: "hour-header-spacer" })];
    HOUR_MARKS.forEach(function (hh, i) {
      hourHeaderCells.push(el("div", { class: "hour-cell" + (i === 0 ? " first" : ""), style: { width: HOUR_W + "px" }, text: hh + ":00" }));
    });
    var hourHeader = el("div", { class: "hour-header" }, hourHeaderCells);

    var dayRows = days.map(function (d) {
      var dKey = dateKey(d);
      var rc = computeRows(dKey);
      var rowCount = rc.rowCount, placements = rc.placements;
      var isToday = dateKey(new Date()) === dKey;
      var isSunday = d.getDay() === 0;
      var isSaturday = d.getDay() === 6;
      var dayHeight = 14 + rowCount * ROW_H;
      var dayCost = calcDayCost(dKey);
      var dayDispatchFee = calcDayDispatchFee(dKey);

      var labelChildren = [
        el("div", { class: "day-date num", text: (d.getMonth() + 1) + "/" + d.getDate() }),
        el("div", { class: "day-weekday", style: { color: isSunday ? "#D6402C" : isSaturday ? "#1D5B9B" : "#9C9382" }, text: "(" + WEEKDAY_JA[d.getDay()] + ")" })
      ];
      if (dayCost > 0 && state.showCost) {
        labelChildren.push(el("div", { class: "day-cost num", text: "¥" + dayCost.toLocaleString() }));
      }
      if (dayDispatchFee > 0 && state.showCost) {
        labelChildren.push(el("div", { class: "num", style: { fontSize: "10px", color: "#9B3A9B", fontWeight: 700, marginTop: "1px" }, text: "派遣 ¥" + dayDispatchFee.toLocaleString() }));
      }
      var isCopied = state.copiedDKey === dKey;
      var copyBtn = el("button", {
        class: "day-copy-btn" + (isCopied ? " copied" : ""),
        text: isCopied ? "✓ コピー中" : "コピー",
        onclick: function (e) {
          e.stopPropagation();
          if (isCopied) { state.copiedDKey = null; render(); }
          else copyDay(dKey);
        }
      });
      labelChildren.push(copyBtn);
      if (state.copiedDKey && state.copiedDKey !== dKey) {
        var pasteBtn = el("button", {
          class: "day-paste-btn",
          text: "貼り付け",
          onclick: function (e) { e.stopPropagation(); pasteDay(dKey); }
        });
        labelChildren.push(pasteBtn);
      }
      var dayLabel = el("div", { class: "day-label" + (isToday ? " today" : ""), style: { width: HEADER_W + "px" } }, labelChildren);

      var timelineChildren = [];
      for (var i = 0; i < 24; i++) {
        timelineChildren.push(el("div", { class: "hour-line" + (i % 6 === 0 ? " major" : ""), style: { left: (i * HOUR_W) + "px" } }));
      }
      // 系列店版: SLOT背景・必要人数・不足ハイライトは非表示
      placements.forEach(function (pl) {
        var entry = pl.entry, row = pl.row;
        var s = sById[entry.staffId];
        if (!s) return;
        var left = (entry.start / 60) * HOUR_W;
        var width = Math.max(((entry.end - entry.start) / 60) * HOUR_W, 30);

        var bar = document.createElement("div");
        bar.className = "work-bar bar";
        bar.style.left = left + "px";
        bar.style.top = (14 + row * ROW_H + 3) + "px";
        bar.style.width = (width - 2) + "px";
        bar.style.height = (ROW_H - 6) + "px";
        bar.style.background = s.color;
        bar.title = s.name + " " + formatClock(entry.start) + "-" + formatClock(entry.end, true) + (entry.breakMin ? " 休憩" + entry.breakMin + "分" : "");

        var label = document.createElement("span");
        label.className = "bar-label";
        label.textContent = s.name;
        bar.appendChild(label);

        var handleL = document.createElement("div");
        handleL.className = "drag-handle left";
        bar.appendChild(handleL);

        var handleR = document.createElement("div");
        handleR.className = "drag-handle right";
        bar.appendChild(handleR);

        var dragMoved = false;
        bar.addEventListener("click", function (e) {
          if (dragMoved) { dragMoved = false; return; }
          e.stopPropagation();
          state.editingEntry = { dKey: dKey, entry: entry };
          render();
        });

        function startDrag(e, mode) {
          e.stopPropagation();
          e.preventDefault();
          dragMoved = false;
          bar.classList.add("dragging");

          var isTouch = e.type === "touchstart";
          var startX = isTouch ? e.touches[0].clientX : e.clientX;
          var origStart = entry.start;
          var origEnd = entry.end;
          var SNAP = 30;

          function onMove(ev) {
            var clientX = ev.touches ? ev.touches[0].clientX : ev.clientX;
            var dx = clientX - startX;
            var dMin = Math.round((dx / HOUR_W) * 60 / SNAP) * SNAP;
            if (dMin === 0) return;
            dragMoved = true;

            var newStart = origStart, newEnd = origEnd;
            if (mode === "left") {
              newStart = Math.max(0, Math.min(origEnd - SNAP, origStart + dMin));
            } else if (mode === "right") {
              newEnd = Math.max(origStart + SNAP, Math.min(1440, origEnd + dMin));
            } else {
              var shift = dMin;
              newStart = Math.max(0, Math.min(1440 - (origEnd - origStart), origStart + shift));
              newEnd = newStart + (origEnd - origStart);
            }

            var newL = (newStart / 60) * HOUR_W;
            var newW = Math.max(((newEnd - newStart) / 60) * HOUR_W, 30);
            bar.style.left = newL + "px";
            bar.style.width = (newW - 2) + "px";
            bar.title = s.name + " " + formatClock(newStart) + "-" + formatClock(newEnd, true);
            label.textContent = s.name + " " + formatClock(newStart) + "-" + formatClock(newEnd, newEnd === 1440);
          }

          function onEnd() {
            bar.classList.remove("dragging");
            label.textContent = s.name;
            document.removeEventListener("mousemove", onMove);
            document.removeEventListener("mouseup", onEnd);
            document.removeEventListener("touchmove", onMove);
            document.removeEventListener("touchend", onEnd);

            if (!dragMoved) return;

            var curLeft = parseFloat(bar.style.left);
            var curWidth = parseFloat(bar.style.width) + 2;
            var SNAP2 = 30;
            var finalStart = Math.round((curLeft / HOUR_W) * 60 / SNAP2) * SNAP2;
            var finalEnd = Math.round(((curLeft + curWidth) / HOUR_W) * 60 / SNAP2) * SNAP2;
            if (finalEnd <= finalStart) finalEnd = finalStart + SNAP2;
            finalStart = Math.max(0, Math.min(1440 - SNAP2, finalStart));
            finalEnd = Math.max(finalStart + SNAP2, Math.min(1440, finalEnd));

            var updated = Object.assign({}, entry, { start: finalStart, end: finalEnd });
            var list = state.entriesByDate[dKey] || [];
            state.entriesByDate[dKey] = list.map(function (e2) { return e2.id === entry.id ? updated : e2; });
            persistEntries(dKey);
            render();
          }

          document.addEventListener("mousemove", onMove);
          document.addEventListener("mouseup", onEnd);
          document.addEventListener("touchmove", onMove, { passive: false });
          document.addEventListener("touchend", onEnd);
        }

        handleL.addEventListener("mousedown", function (e) { startDrag(e, "left"); });
        handleL.addEventListener("touchstart", function (e) { startDrag(e, "left"); }, { passive: false });
        handleR.addEventListener("mousedown", function (e) { startDrag(e, "right"); });
        handleR.addEventListener("touchstart", function (e) { startDrag(e, "right"); }, { passive: false });
        label.addEventListener("mousedown", function (e) { startDrag(e, "move"); });
        label.addEventListener("touchstart", function (e) { startDrag(e, "move"); }, { passive: false });

        timelineChildren.push(bar);
      });

      var timeline = el("div", {
        class: "timeline",
        style: { width: TIMELINE_W + "px", height: Math.max(dayHeight, ROW_H * 1.6) + "px" },
        onclick: function (e) { if (e.target === e.currentTarget) { state.editingEntry = { dKey: dKey, entry: null }; render(); } }
      }, timelineChildren);

      return el("div", { class: "day-row" }, [dayLabel, timeline]);
    });

    var gridInner = el("div", { class: "grid-inner", style: { minWidth: (HEADER_W + TIMELINE_W + 40) + "px" } }, [hourHeader].concat(dayRows));
    return el("div", { class: "grid-wrap scrollbar-thin" }, [gridInner]);
  }

  // ===================== 描画: EntryEditor =====================
  function renderEntryEditor() {
    var ctx = state.editingEntry;

    var y = parts[0], m = parts[1], dd = parts[2];

    // ローカル編集状態(モーダル内だけの一時状態)
    var localStaffId = entry ? entry.staffId : (state.staff[0] ? state.staff[0].id : "");
    var localStart = entry ? entry.start : 0;

      { value: 75, label: "75分" },

    function rerenderSheet() {

    function buildSheet() {
      var invalid = localEnd <= localStart;
      var workMin = Math.max((localEnd - localStart) - localBreak, 0);
      var sObj = staffById()[localStaffId];
      var wagePart = sObj ? Math.round((workMin / 60) * (sObj.hourlyWage || 0)) : 0;
      var dispatchFee = (sObj && sObj.isDispatch) ? Math.round((wagePart + localBonus) * (sObj.dispatchFeeRate || 0) / 100) : 0;
      var previewCost = wagePart + localBonus + dispatchFee;

      var header = el("div", { class: "sheet-header" }, [

        ]),

        })
      );
      sheetBody.appendChild(el("div", { class: "field" }, [el("div", { class: "field-label", text: "スタッフ" }), staffSelect]));

      // 開始・終了
      var startSelect = el("select", { class: "select-input", onchange: function (e) { localStart = Number(e.target.value); rerenderSheet(); } },
        TIME_OPTIONS.filter(function (o) { return o.value < 1440; }).map(function (o) { return el("option", { value: o.value, selected: o.value === localStart ? true : null, text: o.label }); })
      );
      var endSelect = el("select", { class: "select-input", onchange: function (e) { localEnd = Number(e.target.value); rerenderSheet(); } },
        TIME_OPTIONS.filter(function (o) { return o.value > 0; }).map(function (o) { return el("option", { value: o.value, selected: o.value === localEnd ? true : null, text: o.label }); })
      );
      sheetBody.appendChild(el("div", { class: "field-row" }, [

        el("div", { style: { flex: 1 } }, [el("div", { class: "field-label", text: "終了" }), endSelect])
      ]));

      // 休憩時間
      var breakSelect = el("select", { class: "select-input", onchange: function (e) { localBreak = Number(e.target.value); rerenderSheet(); } },
        BREAK_OPTIONS.map(function (o) { return el("option", { value: o.value, selected: o.value === localBreak ? true : null, text: o.label }); })
      );
      sheetBody.appendChild(el("div", { class: "field" }, [el("div", { class: "field-label", text: "休憩時間" }), breakSelect]));

      // 加給
      var bonusInput = el("input", { type: "number", min: "0", value: localBonus, placeholder: "0", oninput: function (e) { localBonus = Number(e.target.value) || 0; rerenderSheet(); } });

    var overlay = el("div", { class: "overlay", onclick: closeModal }, [sheetBody]);

            s.isDispatch ? el("span", { class: "dispatch-tag", text: "派遣" }) : null
          ].filter(Boolean)),
          el("div", { class: "wage-input-wrap" }, [el("span", { class: "wage-symbol", text: "¥" }), wageInput, el("span", { class: "wage-symbol", text: "/h" })]),
          el("button", { class: "icon-btn", "aria-label": s.name + "を削除", style: { color: "#D6402C" }, onclick: function () { removeStaff(s.id); } }, [iconTrash(16)])
        ]),
        dispatchRow
      ]);
      listWrap.appendChild(row);
    });

    var header = el("div", { class: "sheet-header" }, [
      el("h2", { class: "sheet-title", style: { margin: 0 }, text: "スタッフ管理" }),
      el("button", { class: "icon-btn", "aria-label": "閉じる", onclick: closeModal }, [iconX(20)])
    ]);

    function handleAdd() {
      if (!nameVal.trim()) return;
      addStaff(nameVal, wageVal); // 内部でrender()が呼ばれ、パネル全体が最新状態で再生成される
    }

    var nameInput = el("input", { type: "text", placeholder: "氏名", style: { flex: "2" }, oninput: function (e) { nameVal = e.target.value; } });
    nameInput.addEventListener("keydown", function (e) { if (e.key === "Enter") handleAdd(); });
    var wageInput2 = el("input", { type: "number", placeholder: "時給(円)", min: "0", style: { flex: "1" }, oninput: function (e) { wageVal = e.target.value; } });
    var addRow = el("div", { class: "staff-add-row" }, [nameInput, wageInput2]);
    var addBtn = el("button", { class: "staff-add-btn", onclick: handleAdd }, [iconUserPlus(16), document.createTextNode(" スタッフを追加")]);

    sheetBody.appendChild(header);
    sheetBody.appendChild(el("div", { style: { marginTop: "16px" } }, [addRow, addBtn]));
    sheetBody.appendChild(listWrap);

    var overlay = el("div", { class: "overlay", onclick: closeModal }, [sheetBody]);
    return overlay;
  }

  // ===================== 描画: トースト =====================
  function renderToast() {
    if (!state.toast) return null;
    return el("div", { class: "toast " + state.toast.kind, text: state.toast.msg });
  }

  // ===================== メイン render =====================
  var root = document.getElementById("app-root");

  function render() {
    root.innerHTML = "";
    var wrap = el("div", null, []);

    root.appendChild(renderHeader());
    var main = el("main", { class: "app-main" }, [
      renderWeekNav(),
      renderGrid(),
      el("p", { class: "helper-text", text: "タイムラインの空いている場所をタップすると勤務を追加できます。バーをタップすると編集・削除できます。薄い赤色の帯は必要人数を満たしていない時間帯です。" })
    ]);
    root.appendChild(main);

    if (state.editingEntry) root.appendChild(renderEntryEditor());
    if (state.staffPanelOpen) root.appendChild(renderStaffPanel());
    var toastNode = renderToast();
    if (toastNode) root.appendChild(toastNode);
  }

  // ===================== 初期化 =====================
  try {
    loadWeekEntries();
    render();
  } catch (e) {
    var box = document.getElementById("error-box");
    box.style.display = "block";
    box.textContent = "アプリの起動に失敗しました:\n\n" + (e && e.stack ? e.stack : e);
  }
})();
} // end startApp
</script>
</body>
</html>
